<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="card">

    <h1>🔐 Login</h1>

    <form method="POST">

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="input">

        <button type="submit" class="btn restart">
            Login
        </button>

    </form>

    {% if error %}
        <p style="color:#ef4444;text-align:center;">
            Wrong Password
        </p>
    {% endif %}

</div>

</body>
</html>
